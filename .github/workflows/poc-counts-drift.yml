name: poc-counts-drift

# Verifies that the hand-typed POC counts in examples/playground/README.md
# match the on-disk catalog under examples/playground/pocs/. If someone adds
# or removes a POC without re-running scripts/update-poc-counts.sh, this
# workflow fails the PR.
#
# The generated docs/src/data/poc-counts.json and docs/public/llms.txt are
# gitignored (regenerated by the docs build), so they are not diffed here —
# the README is the single git-tracked count surface.

on:
  push:
    branches: [main]
    paths:
      - 'examples/playground/pocs/**'
      - 'examples/playground/README.md'
      - 'docs/scripts/count-pocs.mjs'
      - 'scripts/update-poc-counts.sh'
      - '.github/workflows/poc-counts-drift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/playground/pocs/**'
      - 'examples/playground/README.md'
      - 'docs/scripts/count-pocs.mjs'
      - 'scripts/update-poc-counts.sh'
      - '.github/workflows/poc-counts-drift.yml'

# CI only reads the repo; restrict the token to the minimum (CodeQL ql-for-actions).
permissions:
  contents: read

jobs:
  drift:
    name: Check POC counts are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Recompute POC counts
        run: bash scripts/update-poc-counts.sh

      - name: Fail if the README counts drifted
        run: |
          if ! git diff --exit-code examples/playground/README.md; then
            echo ""
            echo "❌ POC counts in examples/playground/README.md drifted from the catalog."
            echo "Run \`bash scripts/update-poc-counts.sh\` locally and commit the result."
            exit 1
          fi
          echo "✓ POC counts match the on-disk catalog."
