name: sdk-ci

on:
  push:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - 'schemas/**'
      - '.github/workflows/sdk-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - 'schemas/**'
      - '.github/workflows/sdk-ci.yml'

# Cancel superseded in-progress runs on the same PR — a new push supersedes the
# previous run instead of letting both finish. Scoped to pull_request so a
# fast-follow merge to main never cancels a main-branch validation run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# CI only reads the repo; restrict the token to the minimum (CodeQL ql-for-actions).
permissions:
  contents: read

defaults:
  run:
    working-directory: sdk/python

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --dev
      - run: uv run python -m pytest -v
      - run: uv run python -m ruff check src/ tests/ examples/
      - run: uv run python -m ruff format --check src/ tests/ examples/

  smoke:
    name: Example smoke (real binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install the rocky binary (latest engine release)
        # The unit tests mock the binary; this job drives the SDK against a real
        # rocky to catch breakage the mocks can't (argv, exit codes, JSON shapes).
        run: |
          bash "$GITHUB_WORKSPACE/engine/install.sh"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv sync
      - name: Run the SDK quickstart against a generated playground
        run: uv run python examples/quickstart.py
