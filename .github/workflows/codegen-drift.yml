name: codegen-drift

# Verifies that the committed schema files and generated bindings are
# up-to-date with the engine's Rust source. If someone changes a CLI
# output struct without running `just codegen`, this workflow fails the PR.

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'schemas/**'
      - 'integrations/dagster/src/dagster_rocky/types_generated/**'
      - 'integrations/dagster/tests/fixtures_generated/**'
      - 'editors/vscode/src/types/generated/**'
      - 'examples/playground/pocs/00-foundations/00-playground-default/**'
      - 'scripts/regen_fixtures.sh'
      - 'justfile'
      - '.github/workflows/codegen-drift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'engine/**'
      - 'schemas/**'
      - 'integrations/dagster/src/dagster_rocky/types_generated/**'
      - 'integrations/dagster/tests/fixtures_generated/**'
      - 'editors/vscode/src/types/generated/**'
      - 'examples/playground/pocs/00-foundations/00-playground-default/**'
      - 'scripts/regen_fixtures.sh'
      - 'justfile'
      - '.github/workflows/codegen-drift.yml'

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 4

jobs:
  drift:
    name: Check codegen is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine

      - name: Install cmake (for DuckDB)
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Free disk space and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo fallocate -l 4G /mnt/swapfile && sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile || true

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install duckdb (for fixture regen)
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"

      - name: uv sync (dagster)
        run: uv sync --dev
        working-directory: integrations/dagster

      - name: npm install (vscode)
        run: npm ci
        working-directory: editors/vscode

      # Fast pre-check: cargo test for the export-schemas registry catches
      # the most common drift modes (missing JsonSchema derive, duplicate
      # registration, schema file count mismatch) with cleaner error
      # messages than the file-diff at the end. Runs before any codegen
      # so CI fails fast on registry mistakes.
      - name: cargo test export-schemas registry
        run: cargo test -p rocky-cli --lib commands::export_schemas
        working-directory: engine

      # `just codegen-rust` uses `cargo run --release`, which builds the
      # rocky binary in release mode. The same binary is reused by
      # `just regen-fixtures` below — no second build needed.
      - name: Run full codegen
        run: just codegen

      - name: Regenerate fixtures
        run: just regen-fixtures

      - name: Fail if anything drifted
        run: |
          if ! git diff --exit-code schemas/ \
                                    integrations/dagster/src/dagster_rocky/types_generated/ \
                                    integrations/dagster/tests/fixtures_generated/ \
                                    editors/vscode/src/types/generated/; then
            echo ""
            echo "❌ Codegen output or generated fixtures drifted from the committed files."
            echo "Run \`just codegen\` and \`just regen-fixtures\` locally and commit the result."
            exit 1
          fi
          echo "✓ Codegen output and generated fixtures match committed files."
