# Load committed dashboard JSON from disk into a "Rocky" folder.
apiVersion: 1

providers:
  - name: rocky
    orgId: 1
    folder: Rocky
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
