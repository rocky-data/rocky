[adapter.databricks_prod]
type = "databricks"
host = "${DATABRICKS_HOST}"
http_path = "${DATABRICKS_HTTP_PATH}"
token = "${DATABRICKS_TOKEN}"

[adapter.fivetran_main]
type = "fivetran"
kind = "discovery"
destination_id = "${FIVETRAN_DESTINATION_ID}"
api_key = "${FIVETRAN_API_KEY}"
api_secret = "${FIVETRAN_API_SECRET}"

[pipeline.poc]
strategy = "incremental"
timestamp_column = "_fivetran_synced"

[pipeline.poc.source]
adapter = "databricks_prod"
catalog = "${FIVETRAN_SOURCE_CATALOG:-fivetran}"

[pipeline.poc.source.discovery]
adapter = "fivetran_main"

[pipeline.poc.source.schema_pattern]
prefix = "src__"
separator = "__"
components = ["tenant", "regions...", "source"]

[pipeline.poc.target]
adapter = "databricks_prod"
catalog_template = "{tenant}_warehouse"
schema_template = "staging__{regions}__{source}"

[pipeline.poc.target.governance]
auto_create_catalogs = true
auto_create_schemas = true
