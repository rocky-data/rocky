# 07-freshness-sla — default config, with NO project-wide [freshness] default.
#
# `rocky compile` auto-loads this rocky.toml, so leaving the top-level
# [freshness] block OUT is what lets W005 fire in step 1 (a model with a
# temporal column but no freshness declaration in scope). The companion
# `rocky-project-freshness.toml` adds the project default to show suppression.

[adapter]
type = "duckdb"

[pipeline.poc]
strategy = "full_refresh"

[pipeline.poc.source.schema_pattern]
prefix = "raw__"
separator = "__"
components = ["source"]

[pipeline.poc.target]
catalog_template = "poc"
schema_template = "demo"
