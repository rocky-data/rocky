name: Bug Report
description: Report a bug in Rocky
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `rocky ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or output if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Rocky Version
      description: Output of `rocky --version`
      placeholder: "rocky 0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "macOS 15.0 arm64 / Ubuntu 24.04 x86_64"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant sections of your `rocky.toml` (redact credentials).
      render: toml
    validations:
      required: false
