# Dagster dag_mode — full lineage from Rocky's unified DAG
#
# Two pipelines: ingest (replication) + transform (models).
# `rocky dag` produces the connected graph: source → load → models.

[adapter]
type = "duckdb"
path = "poc.duckdb"

[pipeline.ingest]
strategy = "full_refresh"
timestamp_column = "_updated_at"

[pipeline.ingest.source.discovery]
adapter = "default"

[pipeline.ingest.source.schema_pattern]
prefix = "raw__"
separator = "__"
components = ["source"]

[pipeline.ingest.target]
catalog_template = "poc"
schema_template = "staging__{source}"

[pipeline.ingest.target.governance]
auto_create_schemas = true

[pipeline.transform]
type = "transformation"
depends_on = ["ingest"]

[pipeline.transform.target]
adapter = "default"
