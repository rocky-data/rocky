name: engine-weekly

# Expensive-but-advisory jobs that don't need to run on every PR.
# Coverage (tarpaulin) and security audit run weekly on main and can
# be triggered manually for one-off checks.

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: engine

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install cargo-audit
        # Pin to a specific version + --locked so a regression in a newer
        # cargo-audit release can't silently change the weekly CI signal.
        # Bump deliberately alongside any MSRV or advisory-db change.
        run: cargo install cargo-audit --version 0.21.1 --locked
      - name: Run cargo audit
        run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: engine
      - name: Free disk space and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo fallocate -l 4G /mnt/swapfile && sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile || true
      - run: sudo apt-get update && sudo apt-get install -y cmake
      - name: Install cargo-tarpaulin
        # Pinned + --locked for the same reason as cargo-audit above.
        run: cargo install cargo-tarpaulin --version 0.31.2 --locked
      - name: Run coverage
        run: cargo tarpaulin --all-targets --timeout 600 --out xml --output-dir coverage/
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: engine/coverage/cobertura.xml

  poc-smoke:
    name: POC Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: engine
      - name: Free disk space and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo fallocate -l 4G /mnt/swapfile && sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile || true
      - run: sudo apt-get update && sudo apt-get install -y cmake
      - name: Build rocky binary
        working-directory: engine
        run: cargo build --release
      - name: Add rocky binary to PATH
        run: echo "$GITHUB_WORKSPACE/engine/target/release" >> $GITHUB_PATH
      - name: Run POC smoke tests
        working-directory: ${{ github.workspace }}
        run: bash examples/playground/scripts/run-all-duckdb.sh

      # Parse-validate credential-gated POCs with mock env vars. Catches
      # parse-time breakage (invalid strategy variants, V032/V033 adapter
      # role mismatches, malformed [pipeline.*]) that run-all-duckdb.sh
      # misses because credential-gated POCs short-circuit on the missing
      # env var before `rocky validate` runs. Marked `continue-on-error`
      # until the V033 + materialized_view sweep PRs land — see PR body.
      - name: Parse-validate credential-gated POCs
        working-directory: ${{ github.workspace }}
        continue-on-error: true
        run: bash examples/playground/scripts/run-all-parse-validate.sh
