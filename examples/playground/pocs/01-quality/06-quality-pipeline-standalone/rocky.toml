# Quality pipeline — standalone data quality checks (no data movement)

[adapter]
type = "duckdb"
path = "poc.duckdb"

[pipeline.nightly_dq]
type = "quality"

[pipeline.nightly_dq.target]
adapter = "default"

# `orders` is targeted by name; `customers` uses schema-level targeting
# (omit `table`) to exercise the dialect's `list_tables_sql` path.
[[pipeline.nightly_dq.tables]]
catalog = "poc"
schema  = "staging__orders"
table   = "orders"

[[pipeline.nightly_dq.tables]]
catalog = "poc"
schema  = "staging__customers"

[pipeline.nightly_dq.checks]
enabled = true
row_count = true
column_match = { enabled = true, severity = "warning" }
freshness = { threshold_seconds = 86400, severity = "warning" }
anomaly_threshold_pct = 30.0
# Phase 2 escape hatch: keep the POC green while surfacing failing rows.
# Remove (or set `true`) to fail CI on any error-severity violation.
fail_on_error = false

# --- Phase 3: row quarantine (split mode) ---
# Splits `orders` into `orders__valid` (passing rows) and
# `orders__quarantine` (failing rows with `_error_*` label columns).
# Only error-severity row-level assertions on `orders` drive the split:
# the `not_null` on customer_id and `accepted_values` on status.
# The `expression` on `amount >= 0` is warning-severity — it stays
# observational and does not send order_id=99 to the quarantine table.
[pipeline.nightly_dq.checks.quarantine]
enabled = true
mode    = "split"

# --- Phase 1: row-level assertions (unified surface) ---

# not_null — 2 rows (order_id 7, 42) violate this.
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_customer_id_required"
table    = "orders"
type     = "not_null"
column   = "customer_id"
severity = "error"

# accepted_values — 1 row (order_id 13) with status = 'unknown' violates.
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_status_allowed"
table    = "orders"
type     = "accepted_values"
column   = "status"
values   = ["pending", "shipped", "delivered", "cancelled"]
severity = "error"

# expression — 1 row (order_id 99) with amount = -5 violates.
[[pipeline.nightly_dq.checks.assertions]]
table      = "orders"
type       = "expression"
expression = "amount >= 0"
severity   = "warning"

# unique — passes; customer_id generated sequentially.
[[pipeline.nightly_dq.checks.assertions]]
table    = "customers"
type     = "unique"
column   = "customer_id"
severity = "error"

# not_null email — passes; seed never sets NULL email.
[[pipeline.nightly_dq.checks.assertions]]
table    = "customers"
type     = "not_null"
column   = "email"
severity = "error"

# row_count_range — customers has exactly 50 rows.
[[pipeline.nightly_dq.checks.assertions]]
table    = "customers"
type     = "row_count_range"
min      = 40
max      = 60
severity = "error"
