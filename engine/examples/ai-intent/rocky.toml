# AI Intent — intent-driven development with AI test generation
#
# Demonstrates Rocky's AI features: models with `intent` fields in their
# TOML sidecars, enabling automatic test generation, explanation, and sync.
#
# Usage:
#   rocky --config engine/examples/ai-intent/rocky.toml compile \
#     --models engine/examples/ai-intent/models/
#   rocky --config engine/examples/ai-intent/rocky.toml test \
#     --tests-dir engine/examples/ai-intent/tests/ \
#     --models engine/examples/ai-intent/models/
#
# AI features (require ANTHROPIC_API_KEY):
#   rocky ai-test --config engine/examples/ai-intent/rocky.toml \
#     --models engine/examples/ai-intent/models/

[adapter.local]
type = "duckdb"

[pipeline.ai_demo]
type = "replication"
strategy = "full_refresh"

[pipeline.ai_demo.source]
adapter = "local"

[pipeline.ai_demo.source.schema_pattern]
prefix = "raw__"
separator = "__"
components = ["source"]

[pipeline.ai_demo.target]
adapter = "local"
catalog_template = "warehouse"
schema_template = "analytics"

[pipeline.ai_demo.target.governance]
auto_create_catalogs = false
auto_create_schemas = false

[state]
backend = "local"
