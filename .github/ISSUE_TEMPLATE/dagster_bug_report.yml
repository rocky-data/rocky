name: Bug Report
description: Report a bug in dagster-rocky
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tracebacks if applicable.
    validations:
      required: true
  - type: input
    id: dagster-rocky-version
    attributes:
      label: dagster-rocky Version
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.0"
    validations:
      required: true
  - type: input
    id: dagster-version
    attributes:
      label: Dagster Version
      placeholder: "1.12.0"
    validations:
      required: true
  - type: input
    id: rocky-version
    attributes:
      label: Rocky CLI Version
      description: Output of `rocky --version`
      placeholder: "rocky 0.1.0"
    validations:
      required: false
