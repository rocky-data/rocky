[strategy]
type = "merge"
unique_key = ["id"]
# `update_columns` must be declared explicitly: BigQuery rejects the
# default `UPDATE SET target = source` shorthand the dialect emits when
# this list is omitted. Documented as a finding in ../README.md.
update_columns = ["name", "amount"]

# `catalog` carries a __GCP_PROJECT__ placeholder that run.sh sed-substitutes
# at runtime; sidecar TOMLs do honor ${VAR}, but the SQL body (read raw) does
# not, so the placeholder keeps staging uniform (see live/README.md).
[target]
catalog = "__GCP_PROJECT__"
schema = "poc_step1_live_merge"
