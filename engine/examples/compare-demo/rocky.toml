# Compare Demo — shadow table validation
#
# Demonstrates `rocky compare` for validating shadow copies against
# production tables. Used when testing pipeline changes safely.
#
# Usage:
#   rocky --config engine/examples/compare-demo/rocky.toml run --shadow --shadow-suffix _shadow
#   rocky --config engine/examples/compare-demo/rocky.toml compare --shadow-suffix _shadow

[adapter.local]
type = "duckdb"

[pipeline.compare_demo]
type = "replication"
strategy = "full_refresh"

[pipeline.compare_demo.source]
adapter = "local"

[pipeline.compare_demo.source.schema_pattern]
prefix = "raw__"
separator = "__"
components = ["source"]

[pipeline.compare_demo.target]
adapter = "local"
catalog_template = "warehouse"
schema_template = "analytics"

[pipeline.compare_demo.target.governance]
auto_create_catalogs = false
auto_create_schemas = false

[pipeline.compare_demo.checks]
row_count = true
column_match = true

[pipeline.compare_demo.execution]
concurrency = 4

[state]
backend = "local"
