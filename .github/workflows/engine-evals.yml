name: engine-evals

# Runs only on PRs labeled "evals" — the agent conformance suite drives a live
# model loop (billable, slower than unit tests), so it is opt-in the same way
# engine-bench is gated on "perf". Add the label to trigger; pushing new commits
# to a labeled PR re-runs it.
#
# The live loop needs a model key, supplied as the ANTHROPIC_API_KEY repository
# secret. When the secret is absent (forks, or the secret is unset), the suite
# SKIPS cleanly and the job stays green — the harness plumbing is still validated
# creds-free via `--selftest`. CI success means "a valid scorecard (or a clean
# skip) was produced", never "every scenario passed": scenario pass/fail and the
# flake rate are recorded on the uploaded scorecard, not gated here.

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - 'engine/evals/**'
      - 'engine/crates/rocky-mcp/**'
      - '.github/workflows/engine-evals.yml'

# CI only reads the repo; restrict the token to the minimum.
permissions:
  contents: read

jobs:
  evals:
    name: Agent conformance evals
    if: contains(github.event.pull_request.labels.*.name, 'evals')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: engine
          key: evals

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # DuckDB C++ compilation needs swap on CI. ubuntu-latest ships an active
      # /swapfile; disable and reallocate it before the release-ish debug build.
      - name: Configure swap
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build rocky (debug)
        working-directory: engine
        run: cargo build --bin rocky

      # Pin to 1.5.3 to match the DuckDB version the engine bundles, so seeded
      # .duckdb files round-trip through `rocky` (same step engine-weekly uses).
      - name: Install the duckdb CLI
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.5.3/duckdb_cli-linux-amd64.zip -o /tmp/duckdb.zip
          sudo unzip -o /tmp/duckdb.zip -d /usr/local/bin
          sudo chmod +x /usr/local/bin/duckdb
          duckdb --version

      - name: Install the Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # Creds-free: always validate the harness plumbing (parser + scoring +
      # scorecard render) regardless of whether the secret is present.
      - name: Harness self-test
        working-directory: engine/evals
        run: uv run python run_evals.py --selftest

      # Creds-free (needs only the `rocky` binary built above): assert the
      # structured MCP error envelope on bad input. Unlike the live authoring
      # scenarios, this is deterministic — a failure here is a real contract
      # regression, so it gates the job.
      - name: Structured-error contract
        working-directory: engine/evals
        env:
          ROCKY_BIN: ${{ github.workspace }}/engine/target/debug/rocky
        run: uv run python run_evals.py --error-contract

      - name: Run the agent conformance suite
        working-directory: engine/evals
        env:
          ROCKY_BIN: ${{ github.workspace }}/engine/target/debug/rocky
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python run_evals.py --max-attempts 2

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-eval-scorecard
          path: |
            engine/evals/results/scorecard.json
            engine/evals/results/scorecard.md
            engine/evals/results/transcripts/
          if-no-files-found: warn
