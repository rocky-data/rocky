[adapter.snowflake]
type = "snowflake"
# Account comes from the SNOWFLAKE_ACCOUNT env var (guarded in run.sh).
# Auth (key-pair JWT / OAuth / password) is resolved by the Snowflake
# connector at run time — the offline validate/compile smoke never connects.
account = "${SNOWFLAKE_ACCOUNT:-demo_account}"
# Compute warehouse for the dynamic-table refresh. The adapter exposes this
# via WarehouseAdapter::warehouse_name; SQL gen threads it into the
# CREATE OR REPLACE DYNAMIC TABLE ... WAREHOUSE = ... DDL. It is NOT a model
# sidecar field — the warehouse lives on the adapter, the target_lag on the model.
warehouse = "ANALYTICS_WH"

# Discovery adapter — Snowflake is data-only, so we declare a
# manual discovery adapter to satisfy the pipeline's discovery
# binding without enumerating any source tables (the POC only
# exercises target-side dynamic-table materialization, not discovery).
[adapter.local_discovery]
type = "manual"
kind = "discovery"

[pipeline.poc]
strategy = "full_refresh"

[pipeline.poc.source]
adapter = "snowflake"
catalog = "ANALYTICS"

[pipeline.poc.source.discovery]
adapter = "local_discovery"

[pipeline.poc.source.schema_pattern]
prefix = "RAW__"
separator = "__"
components = ["source"]

[pipeline.poc.target]
adapter = "snowflake"
catalog_template = "ANALYTICS"
schema_template = "STAGING__{source}"
