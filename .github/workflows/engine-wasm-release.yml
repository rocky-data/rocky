name: engine-wasm-release

# Build rocky-wasm and publish to npm.
# Triggered by engine-wasm-v* tags (independent of CLI binary releases).

on:
  push:
    tags: ["engine-wasm-v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: engine

jobs:
  ensure-release:
    name: Ensure GitHub Release exists
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --generate-notes \
              --title "$TAG"
          fi

  build-and-publish:
    name: Build WASM and publish to npm
    needs: ensure-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: engine
          key: wasm

      # Set up Node with the npm registry so `npm publish` picks up
      # NODE_AUTH_TOKEN automatically (no hand-rolled .npmrc).
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # Prebuilt binary — avoids ~40s of `cargo install wasm-pack --locked`
      # per run and skips a transitive compilation that occasionally trips
      # MSRV / yanked-crate failures.
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e0cafa345d365d15 # v0.4.0
        with:
          version: 'v0.13.1'

      - name: Build WASM (web target)
        run: wasm-pack build crates/rocky-wasm --target web

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#engine-wasm-v}"
          # Accept only SemVer-ish tokens so the value is safe to interpolate
          # into package.json below.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Refusing to publish: tag '${GITHUB_REF_NAME}' did not yield a SemVer version (got '${VERSION}')" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write package.json with tag version
        working-directory: engine/crates/rocky-wasm/pkg
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Use `jq` rather than string interpolation so the version is quoted
          # as a JSON value and never able to break out of the template.
          jq -n --arg version "$PKG_VERSION" '{
            name: "@rocky-data/compiler",
            version: $version,
            description: "WASM bindings for Rockys Rust compiler pipeline — SQL lineage, Rocky DSL parsing, and identifier validation",
            main: "rocky_wasm.js",
            types: "rocky_wasm.d.ts",
            files: [
              "rocky_wasm_bg.wasm",
              "rocky_wasm.js",
              "rocky_wasm.d.ts",
              "rocky_wasm_bg.wasm.d.ts"
            ],
            repository: {
              type: "git",
              url: "https://github.com/rocky-data/rocky",
              directory: "engine/crates/rocky-wasm"
            },
            keywords: ["wasm", "sql", "lineage", "transformation", "rocky"],
            license: "Apache-2.0",
            publishConfig: {
              access: "public"
            }
          }' > package.json

      - name: Archive WASM package
        run: tar czf rocky-wasm.tar.gz -C crates/rocky-wasm/pkg .

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: engine/rocky-wasm.tar.gz

      # Guard inline so the step never parses `secrets.*` in a step-level
      # `if:` (disallowed on public repos) and never depends on step-env
      # visibility in the same step's `if:` (which is unreliable).
      - name: Publish to npm
        working-directory: engine/crates/rocky-wasm/pkg
        env:
          # `actions/setup-node` already wrote a registry-scoped .npmrc that
          # reads $NODE_AUTH_TOKEN from the environment at publish time, so
          # the token never hits disk.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish"
            exit 0
          fi
          npm publish
