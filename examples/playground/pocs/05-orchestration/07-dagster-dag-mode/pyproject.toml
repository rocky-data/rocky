[project]
name = "rocky-dag-mode-poc"
version = "0.0.0"
requires-python = ">=3.11,<3.14"
dependencies = [
    "dagster>=1.13.0",
    "dagster-rocky>=1.2.2",
]

[dependency-groups]
dev = [
    "dagster-webserver",
    "dagster-dg-cli",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rocky_dag_mode_poc"]

[tool.dagster]
module_name = "rocky_dag_mode_poc.definitions"

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "rocky_dag_mode_poc"
