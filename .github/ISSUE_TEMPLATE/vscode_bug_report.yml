name: Bug Report
description: Report a bug in the Rocky VS Code extension
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open a `.rocky` file
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: "1.95.0"
    validations:
      required: true
  - type: input
    id: rocky-version
    attributes:
      label: Rocky CLI Version
      description: Output of `rocky --version`
      placeholder: "rocky 0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.0 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
