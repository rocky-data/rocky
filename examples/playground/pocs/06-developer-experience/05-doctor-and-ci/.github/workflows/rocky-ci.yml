name: Rocky CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rocky-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rocky
        run: curl -fsSL https://raw.githubusercontent.com/rocky-data/rocky/main/engine/install.sh | ROCKY_INSTALL_DIR=/usr/local/bin bash

      - name: rocky doctor
        run: rocky doctor

      - name: rocky ci
        run: rocky ci --models models --output json
