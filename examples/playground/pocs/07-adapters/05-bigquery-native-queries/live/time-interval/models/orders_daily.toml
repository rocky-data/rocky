[strategy]
type = "time_interval"
# Must be a TIMESTAMP column on BigQuery: the runtime emits the partition
# filter as `'YYYY-MM-DD HH:MM:SS'` literals, which BQ refuses to coerce
# to a DATE column.
time_column = "order_day"
granularity = "day"
lookback = 0
first_partition = "2026-04-01"

# `catalog` carries a __GCP_PROJECT__ placeholder that run.sh sed-substitutes
# at runtime; sidecar TOMLs do honor ${VAR}, but the SQL body (read raw) does
# not, so the placeholder keeps staging uniform (see live/README.md).
[target]
catalog = "__GCP_PROJECT__"
schema = "poc_step1_live_ti"
