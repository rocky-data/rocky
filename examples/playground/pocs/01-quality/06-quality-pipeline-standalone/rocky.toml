# Quality pipeline ‚Äî standalone data quality checks (no data movement)

[adapter]
type = "duckdb"
path = "poc.duckdb"

[pipeline.nightly_dq]
type = "quality"

[pipeline.nightly_dq.target]
adapter = "default"

# `orders` is targeted by name; `customers` uses schema-level targeting
# (omit `table`) to exercise the dialect's `list_tables_sql` path.
[[pipeline.nightly_dq.tables]]
catalog = "poc"
schema  = "staging__orders"
table   = "orders"

[[pipeline.nightly_dq.tables]]
catalog = "poc"
schema  = "staging__customers"

[pipeline.nightly_dq.checks]
enabled = true
row_count = true
column_match = { enabled = true, severity = "warning" }
freshness = { threshold_seconds = 86400, severity = "warning" }
anomaly_threshold_pct = 30.0
# Phase 2 escape hatch: keep the POC green while surfacing failing rows.
# Remove (or set `true`) to fail CI on any error-severity violation.
fail_on_error = false

# --- Phase 3: row quarantine (split mode) ---
# Splits `orders` into `orders__valid` (passing rows) and
# `orders__quarantine` (failing rows with `_error_*` label columns).
# Only error-severity row-level assertions on `orders` drive the split:
# the `not_null` on customer_id and `accepted_values` on status.
# The `expression` on `amount >= 0` is warning-severity ‚Äî it stays
# observational and does not send order_id=99 to the quarantine table.
[pipeline.nightly_dq.checks.quarantine]
enabled = true
mode    = "split"

# --- Phase 1: row-level assertions (unified surface) ---

# not_null ‚Äî 2 rows (order_id 7, 42) violate this.
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_customer_id_required"
table    = "orders"
type     = "not_null"
column   = "customer_id"
severity = "error"

# accepted_values ‚Äî 1 row (order_id 13) with status = 'unknown' violates.
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_status_allowed"
table    = "orders"
type     = "accepted_values"
column   = "status"
values   = ["pending", "shipped", "delivered", "cancelled"]
severity = "error"

# expression ‚Äî 1 row (order_id 99) with amount = -5 violates.
[[pipeline.nightly_dq.checks.assertions]]
table      = "orders"
type       = "expression"
expression = "amount >= 0"
severity   = "warning"

# unique ‚Äî passes; customer_id generated sequentially.
[[pipeline.nightly_dq.checks.assertions]]
table    = "customers"
type     = "unique"
column   = "customer_id"
severity = "error"

# not_null email ‚Äî passes; seed never sets NULL email.
[[pipeline.nightly_dq.checks.assertions]]
table    = "customers"
type     = "not_null"
column   = "email"
severity = "error"

# row_count_range ‚Äî customers has exactly 50 rows.
[[pipeline.nightly_dq.checks.assertions]]
table    = "customers"
type     = "row_count_range"
min      = 40
max      = 60
severity = "error"

# --- Phase 4a: in_range + regex_match + per-check filter ---

# in_range ‚Äî amount should be within [0, 10000]. Row 99 has amount = -5
# (failing) but the `expression` assertion above already catches it at
# warning severity. This error-severity `in_range` will both count the
# failure AND quarantine the row (predicate lowers into the split).
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_amount_in_range"
table    = "orders"
type     = "in_range"
column   = "amount"
min      = "0"
max      = "10000"
severity = "error"

# regex_match ‚Äî the `email` column in `customers` should match an email
# pattern. Seed data uses `customer{i}@example.com`; this should pass.
[[pipeline.nightly_dq.checks.assertions]]
name     = "customers_email_format"
table    = "customers"
type     = "regex_match"
column   = "email"
pattern  = "^[a-z0-9_]+@[a-z0-9.]+$"
severity = "warning"

# filter ‚Äî scope a check to a subset of rows. This `not_null` on
# `customer_id` only applies to rows where status = 'shipped'; the
# quarantine wraps the base predicate in `CASE WHEN (filter) THEN base
# ELSE TRUE END` so out-of-scope rows (e.g. pending) stay valid even if
# customer_id is NULL. Note: the broader error-severity `not_null` on
# customer_id above still applies to all rows.
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_shipped_customer_id_present"
table    = "orders"
type     = "not_null"
column   = "customer_id"
filter   = "status = 'shipped'"
severity = "warning"

# --- Phase 4b: aggregate + composite unique + time_window ---

# aggregate ‚Äî sum(amount) must be > 0. Passes because positive amounts
# dominate (the single row with amount = -5 doesn't flip the sign).
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_positive_total"
table    = "orders"
type     = "aggregate"
op       = "sum"
column   = "amount"
cmp      = ">"
value    = "0"
severity = "warning"

# composite unique ‚Äî (order_id, customer_id) pair. order_id is already
# globally unique so this passes trivially; real configs pair keys that
# aren't individually unique (e.g. `["order_id", "line_item_id"]`).
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_composite_unique"
table    = "orders"
type     = "composite"
kind     = "unique"
columns  = ["order_id", "customer_id"]
severity = "warning"

# not_in_future ‚Äî created_at must not be in the future. Seed generates
# timestamps around 2026-04-01; all should pass.
[[pipeline.nightly_dq.checks.assertions]]
name     = "orders_created_at_not_in_future"
table    = "orders"
type     = "not_in_future"
column   = "created_at"
severity = "error"
