name: engine-evals

# Pull-request validation is intentionally credential-free. The workflow
# runs under the ordinary pull-request event, with no environment or secret
# references. Live model calls run only in engine-evals-live.yml on main.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - 'engine/evals/**'
      - 'engine/crates/rocky-mcp/**'
      - '.github/workflows/engine-evals.yml'

permissions:
  contents: read

concurrency:
  group: engine-evals-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  eval-contract:
    name: Agent eval harness and error contract (credential-free)
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: engine
          key: evals-pr

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Configure swap
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build rocky (debug)
        working-directory: engine
        run: cargo build --bin rocky

      - name: Harness self-test
        working-directory: engine/evals
        run: uv run python run_evals.py --selftest

      - name: Structured-error contract
        working-directory: engine/evals
        env:
          ROCKY_BIN: ${{ github.workspace }}/engine/target/debug/rocky
        run: uv run python run_evals.py --error-contract
