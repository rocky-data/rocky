# BigQuery adapter — backtick-quoted project.dataset.table, REST API execution

[adapter.bigquery]
type = "bigquery"
project_id = "${GCP_PROJECT_ID}"
location = "${BQ_LOCATION:-US}"

[pipeline.poc]
strategy = "incremental"
timestamp_column = "_loaded_at"

[pipeline.poc.source]
adapter = "bigquery"
catalog = "${GCP_PROJECT_ID}"

[pipeline.poc.source.schema_pattern]
prefix = "raw__"
separator = "__"
components = ["source"]

[pipeline.poc.target]
adapter = "bigquery"
catalog_template = "${GCP_PROJECT_ID}"
schema_template = "staging__{source}"
