# POC: time_interval materialization (partition checksums)
#
# Demonstrates Rocky's time_interval strategy by promoting the
# raw__orders.orders DuckDB table into a daily fct_daily_orders fact
# via the @start_date / @end_date placeholder mechanism.
#
# The model reads directly from the raw DuckDB table seeded by
# data/seed.sql, so replication isn't the subject of this demo. The
# minimal replication pipeline below still runs on each `rocky run`
# (it copies raw__orders into poc.staging__orders); the interesting
# work is the transformation models executed via `--models models/`.

[adapter]
type = "duckdb"
path = "poc.duckdb"

# A trivial replication pipeline: it runs on each `rocky run` (copying
# raw__orders into poc.staging__orders). The demo's focus is the
# transformation models executed via `--models models/`.
[pipeline.poc]
strategy = "full_refresh"

[pipeline.poc.source.schema_pattern]
prefix = "raw__"
separator = "__"
components = ["source"]

[pipeline.poc.target]
catalog_template = "poc"
schema_template = "staging__{source}"

[pipeline.poc.target.governance]
auto_create_schemas = true
